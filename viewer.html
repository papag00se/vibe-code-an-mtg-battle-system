<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stack Tutor — Reader</title>
<style>
  :root {
    --bg: #0f1116; --panel: #171a22; --panel-2: #1e222c;
    --ink: #e7e9ee; --muted: #9aa3b2; --line: #2a2f3a; --accent: #c9a227;
    --code-bg: #0b0d12;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; color: var(--ink); line-height: 1.65;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 800px at 80% -10%, #1b2030 0%, var(--bg) 60%);
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .topbar {
    position: sticky; top: 0; z-index: 5;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 12px 20px; background: rgba(15,17,22,0.85); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  .topbar .left { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .topbar .brand { font-weight: 700; letter-spacing: -0.01em; }
  .topbar .crumb { color: var(--muted); font-size: 0.9rem; }
  .btn {
    display: inline-block; padding: 7px 13px; border-radius: 8px; font-size: 0.85rem;
    font-weight: 600; border: 1px solid var(--line); color: var(--ink); background: var(--panel-2);
  }
  .btn:hover { border-color: var(--accent); text-decoration: none; }
  main { max-width: 820px; margin: 0 auto; padding: 32px 22px 80px; }

  /* Rendered markdown */
  .md h1 { font-size: 2rem; letter-spacing: -0.02em; margin: 0.2em 0 0.5em; }
  .md h2 { font-size: 1.5rem; margin: 1.6em 0 0.5em; padding-bottom: 0.3em; border-bottom: 1px solid var(--line); }
  .md h3 { font-size: 1.18rem; margin: 1.4em 0 0.4em; color: #f0e6c8; }
  .md p, .md li { color: #dde1ea; }
  .md a { color: var(--accent); }
  .md ul, .md ol { padding-left: 1.4em; }
  .md li { margin: 0.25em 0; }
  .md blockquote {
    margin: 1em 0; padding: 0.4em 1em; color: var(--muted);
    border-left: 4px solid var(--accent); background: rgba(201,162,39,0.06); border-radius: 0 8px 8px 0;
  }
  .md code {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.9em; background: var(--panel-2); padding: 0.15em 0.4em; border-radius: 5px;
  }
  .md pre {
    background: var(--code-bg); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; overflow-x: auto;
  }
  .md pre code { background: none; padding: 0; font-size: 0.88rem; color: #d7dbe4; }
  .md table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 0.95rem; }
  .md th, .md td { border: 1px solid var(--line); padding: 8px 12px; text-align: left; }
  .md th { background: var(--panel-2); }
  .md tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
  .md hr { border: none; border-top: 1px solid var(--line); margin: 2em 0; }
  .md img { max-width: 100%; }

  .notice { max-width: 820px; margin: 0 auto; padding: 0 22px; }
  .msg { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 18px 20px; color: var(--muted); }
  .msg strong { color: var(--ink); }
</style>
</head>
<body>
  <div class="topbar">
    <div class="left">
      <a class="brand" href="walkthrough.html">⟵ Stack Tutor</a>
      <span class="crumb" id="crumb"></span>
    </div>
    <a class="btn" id="rawlink" href="#" target="_blank" rel="noopener">View raw .md</a>
  </div>
  <main>
    <article class="md" id="content"><p style="color:var(--muted)">Loading…</p></article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script>
    (function () {
      var content = document.getElementById('content');
      var crumb = document.getElementById('crumb');
      var rawlink = document.getElementById('rawlink');

      function showError(html) {
        content.innerHTML = '<div class="msg">' + html + '</div>';
      }

      // Only allow markdown files inside the known project folders (or root docs).
      var ALLOWED_ROOTS = ['docs/', 'lessons/', 'prompts/'];
      var ALLOWED_ROOT_FILES = ['README.md', 'MANIFEST.md', 'AGENTS.md'];

      function isAllowed(path) {
        if (!path || path.indexOf('..') !== -1 || /^https?:/i.test(path)) return false;
        if (!/\.md$/i.test(path)) return false;
        if (ALLOWED_ROOT_FILES.indexOf(path) !== -1) return true;
        return ALLOWED_ROOTS.some(function (r) { return path.indexOf(r) === 0; });
      }

      // Resolve a link found inside a markdown doc to a repo-root-relative path.
      function resolveDocLink(href, baseDir) {
        // Strip any #fragment for resolution, keep it to reattach.
        var frag = '';
        var h = href;
        var hi = h.indexOf('#');
        if (hi !== -1) { frag = h.slice(hi); h = h.slice(0, hi); }
        if (!h) return null;
        var resolved;
        // Root-relative if it already names a known folder.
        if (ALLOWED_ROOTS.some(function (r) { return h.indexOf(r) === 0; }) ||
            ALLOWED_ROOT_FILES.indexOf(h) !== -1) {
          resolved = h;
        } else {
          // Otherwise treat as relative to the current doc's directory.
          resolved = (baseDir ? baseDir : '') + h;
        }
        return { path: resolved, frag: frag };
      }

      var params = new URLSearchParams(location.search);
      var doc = params.get('doc');

      if (!isAllowed(doc)) {
        showError('<strong>No document selected.</strong><br>Go back to the ' +
          '<a href="walkthrough.html">visual walkthrough</a> and pick a file.');
        document.title = 'Stack Tutor — Reader';
      } else {
        crumb.textContent = doc;
        rawlink.href = doc;
        document.title = doc + ' — Stack Tutor';
        var baseDir = doc.indexOf('/') !== -1 ? doc.slice(0, doc.lastIndexOf('/') + 1) : '';

        fetch(doc, { cache: 'no-cache' })
          .then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.text();
          })
          .then(function (text) {
            var rawHtml = marked.parse(text);
            var clean = DOMPurify.sanitize(rawHtml);
            content.innerHTML = clean;

            // Rewrite in-document .md links so they open in this reader too.
            content.querySelectorAll('a[href]').forEach(function (a) {
              var href = a.getAttribute('href');
              if (!href || /^https?:|^mailto:|^#/i.test(href)) return;
              if (!/\.md(#|$)/i.test(href)) return;
              var res = resolveDocLink(href, baseDir);
              if (res && isAllowed(res.path)) {
                a.setAttribute('href', 'viewer.html?doc=' + res.path + res.frag);
              }
            });
            window.scrollTo(0, 0);
          })
          .catch(function (err) {
            showError('<strong>Could not load ' + doc + '</strong><br>' + err.message +
              '.<br><br>If you opened this file directly from disk (file://), browsers block ' +
              'loading local files. View it on the published site instead, or open the ' +
              '<a href="' + doc + '">raw markdown</a>.');
          });
      }
    })();
  </script>
</body>
</html>
